services:
  - type: web
    name: quantity-measurement-frontend
    runtime: static
    buildCommand: npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://your-backend.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html