<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Quantity Measurement</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <div class="background">
            <div class="orb orb-1"></div>
            <div class="orb orb-2"></div>
            <div class="orb orb-3"></div>
        </div>

        <div class="card login-card">
            <div class="logo">
                <div class="logo-box">
                    <span class="logo-text">QM</span>
                </div>
                <h1 class="title">Welcome Back</h1>
                <p class="subtitle">Sign in to continue your measurement journey</p>
            </div>

            <div id="errorAlert" class="alert alert-error hidden"></div>

            <form id="loginForm">
                <div class="input-group">
                    <label class="label">Email or Username</label>
                    <div class="input-wrapper">
                        <span class="input-icon">📧</span>
                        <input type="text" id="usernameOrEmail" class="input" placeholder="john@example.com or johndoe"
                            required>
                    </div>
                    <div class="error-message" id="usernameError"></div>
                </div>

                <div class="input-group">
                    <label class="label">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="password" class="input" placeholder="••••••••" required>
                        <button type="button" class="eye-button" id="togglePassword">👁️</button>
                    </div>
                    <div class="error-message" id="passwordError"></div>
                </div>

                <div class="options-row">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe" class="checkbox">
                        <span class="checkbox-text">Remember me</span>
                    </label>
                    <button type="button" class="forgot-link">Forgot password?</button>
                </div>

                <button type="submit" class="btn-primary btn-full" id="loginBtn">
                    <span class="btn-text">Sign In</span>
                    <span class="loader hidden"></span>
                </button>
            </form>

            <div class="divider">
                <span class="divider-text">Or continue with</span>
            </div>

            <button type="button" class="btn-google" id="googleLoginBtn">
                <span class="google-icon">G</span>
                <span>Sign in with Google</span>
            </button>

            <p class="signup-text">
                Don't have an account?
                <a href="/register.html" class="signup-link">Create account</a>
            </p>

            <div class="footer">
                <span>🔒 256-bit SSL</span>
                <span>Encrypted</span>
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/login.js"></script>
</body>

</html>
